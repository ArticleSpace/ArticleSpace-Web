<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArticleSpace</title>
    <style>
        /* Define our core colors */
        :root {
            --primary-blue: #00a8ff; /* Bright sky blue accent */
            --bg-color: #f4f7f6; /* Soft light gray for the background */
            --text-main: #333333; /* Dark gray for high readability */
            --header-bg: #ffffff; /* Pure white header */
        }

        /* Dark Theme Overrides */
        body.dark-theme {
            --bg-color: #121212; /* Deep dark gray background */
            --text-main: #e0e0e0; /* Light gray text for readability */
            --header-bg: #1e1e1e; /* Slightly lighter gray for the header */
        }

        /* Update specific elements that had hardcoded black/white colors */
        body.dark-theme h2,
        body.dark-theme .logo-space,
        body.dark-theme .article-title {
            color: #ffffff; 
        }

        body.dark-theme .article-card {
            background-color: #1e1e1e;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5); /* Darker shadow */
        }

        body.dark-theme .article-summary {
            color: #aaaaaa;
        }

        body.dark-theme #searchBar {
            background-color: #121212;
            color: #ffffff;
            border-color: #333333;
        }
        /* Ensure the blue focus outline works in dark mode */
        body.dark-theme #searchBar:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 8px rgba(0, 168, 255, 0.3); /* Slightly more opaque shadow for dark mode */
            outline: none;
        }
        

        /* General page styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        /* Header styling */
        header {
            background-color: var(--header-bg);
            padding: 15px 40px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; /* Keeps the header at the top when scrolling */
            top: 0;
            z-index: 1000;
        }

        /* Logo styling */
        .logo {
            font-size: 28px;
            font-weight: 800;
            text-decoration: none;
            letter-spacing: -0.5px;
        }
        .logo-article { color: var(--primary-blue); }
        .logo-space { color: #000000; }

        /* Search bar styling */
        .search-container {
            position: relative;
        }
        #searchBar {
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 30px; /* Gives it a modern pill shape */
            width: 350px;
            transition: all 0.3s ease;
        }
        #searchBar:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 8px rgba(0, 168, 255, 0.2);
        }

        /* Main content area */
        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h2 {
            color: #000000;
            margin-bottom: 25px;
            font-size: 24px;
        }

        /* Article list and card styling */
        #articleList {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .article-card {
            background-color: #ffffff;
            padding: 20px 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            border-left: 5px solid var(--primary-blue); /* The bright sky blue accent */
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .article-card:hover {
            transform: translateY(-3px); /* Lifts the card up slightly when hovered */
            box-shadow: 0 8px 15px rgba(0, 168, 255, 0.15); /* Blue tinted shadow on hover */
        }
        .article-title {
            font-size: 20px;
            font-weight: 600;
            margin: 0 0 8px 0;
            color: #000000;
        }
        .article-summary {
            margin: 0;
            color: #666666;
            font-size: 15px;
            line-height: 1.5;
        }

        /* Message for when search yields no results */
        .no-results {
            text-align: center;
            color: #888888;
            font-style: italic;
            display: none;
            margin-top: 40px;
        }
        /* Banner styling */
        .banner {
            background-color: var(--primary-blue);
            color: #ffffff; /* White text to contrast with the blue */
            text-align: center;
            padding: 50px 20px;
            box-shadow: 0 4px 10px rgba(0, 168, 255, 0.2);
        }

        .banner-quote {
            font-size: 24px;
            font-style: italic;
            font-weight: 500;
            margin: 0;
            letter-spacing: 0.5px;
        }
        /* --- Theme Toggle Switch Styling --- */
        .theme-toggle-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Vector icon styling */
        .theme-icon-svg {
            color: var(--text-main); /* Inherits the dark/light text color automatically */
            transition: color 0.3s ease; /* Smooth fade when switching modes */
        }

        /* The switch container */
        .theme-switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }

        /* Hide the default HTML checkbox */
        .theme-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        /* The sliding track */
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.4s;
        }

        /* The sliding circle (handle) */
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.4s;
        }

        /* Rounded styles */
        .slider.round {
            border-radius: 34px;
        }

        .slider.round:before {
            border-radius: 50%;
        }

        /* When the checkbox is checked, change background to blue */
        input:checked + .slider {
            background-color: var(--primary-blue);
        }

        /* When checked, slide the circle to the right */
        input:checked + .slider:before {
            transform: translateX(24px);
        }
        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            header {
                flex-direction: column; /* Stacks the logo and search bar vertically */
                gap: 15px; /* Adds space between them */
                padding: 15px 20px; /* Reduces the side padding to save space */
            }

            .search-container {
                width: 100%; /* Makes the container take up the full screen width */
            }

            #searchBar {
                width: 100%; /* Makes the search input stretch to fit the screen */
                box-sizing: border-box; /* Keeps padding inside the width */
            }

            .banner {
                padding: 30px 15px; /* Shrinks the banner padding slightly */
            }

            .banner-quote {
                font-size: 20px; /* Slightly reduces the quote size for smaller screens */
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">
            <span class="logo-article">Article</span><span class="logo-space">Space</span>
        </a>
        <div class="search-container">
            <input type="text" id="searchBar" placeholder="Search for an article...">
        </div>
        
       <div class="theme-toggle-container">
            <svg class="theme-icon-svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            
            <label class="theme-switch" for="themeToggle">
                <input type="checkbox" id="themeToggle">
                <span class="slider round"></span>
            </label>
            
            <svg class="theme-icon-svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </div>
    </header>

    <div class="banner">
        <p class="banner-quote">"Your daily space for inspiration and learning."</p>
    </div>

    <main>
        <h2>Explore Knowledge</h2>
        <div id="articleList">
            </div>
        <p id="noResults" class="no-results">No articles found matching your search.</p>
    </main>

    <script>
        // 1. This is your "database". Add your new articles to this list!
        const articles = [
            { 
                title: "How to Build a Website", 
                summary: "Learn the fundamentals of HTML, CSS, and JavaScript to create your first page.", 
                link: "build-website.html" 
            },
            { 
                title: "Asteroid Mining", 
                summary: "Discover the importance to mining in outer space.", 
                link: "https://asteroid-mining.github.io/Asteroid-Mining/" 
            },
            { 
                title: "Understanding Physics Engines", 
                summary: "A deep dive into how video games simulate real-world gravity and collisions.", 
                link: "physics-engines.html" 
            },
            { 
                title: "Basics of Astronomy", 
                summary: "An introductory guide to identifying constellations and understanding our solar system.", 
                link: "astronomy.html" 
            }
            {
                title: "Star Systems",
                summary: "An introductory guide to stars.",
                link: "stars.html"
        }
        ];

        // 2. Grab the HTML elements we need to interact with
        const articleListContainer = document.getElementById('articleList');
        const searchBar = document.getElementById('searchBar');
        const noResultsMessage = document.getElementById('noResults');

        // 3. Function to build the clickable cards on the screen
        function displayArticles(articlesToDisplay) {
            articleListContainer.innerHTML = ''; // Clear the current list
            
            if (articlesToDisplay.length === 0) {
                noResultsMessage.style.display = 'block'; // Show "Not found" message
            } else {
                noResultsMessage.style.display = 'none'; // Hide "Not found" message
                
                // Loop through the articles and create a clickable card for each
                articlesToDisplay.forEach(article => {
                    const articleEl = document.createElement('a');
                    articleEl.href = article.link;
                    articleEl.className = 'article-card';
                    articleEl.innerHTML = `
                        <h3 class="article-title">${article.title}</h3>
                        <p class="article-summary">${article.summary}</p>
                    `;
                    articleListContainer.appendChild(articleEl);
                });
            }
        }

        // 4. Show all articles when the page first loads
        displayArticles(articles);

        // 5. Make the search bar work in real-time
        searchBar.addEventListener('input', (e) => {
            const searchString = e.target.value.toLowerCase();
            
            // Filter the articles array based on what the user typed
            const filteredArticles = articles.filter(article => {
                return article.title.toLowerCase().includes(searchString) || 
                       article.summary.toLowerCase().includes(searchString);
            });
            
            // Update the screen with the filtered results
            displayArticles(filteredArticles);
        });

        // --- Dark Mode Logic (Sliding Switch) ---
        const themeToggleInput = document.getElementById('themeToggle');
        
        // 1. Check if the user already chose a theme in a previous visit
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'dark') {
            document.body.classList.add('dark-theme');
            themeToggleInput.checked = true; // Visually slide the switch to the "on" position
        }

        // 2. Listen for the toggle switch to change
        themeToggleInput.addEventListener('change', () => {
            // Toggle the dark-theme class on and off the body
            document.body.classList.toggle('dark-theme');
            
            // 3. Save the choice to localStorage without changing button text
            if (document.body.classList.contains('dark-theme')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
        });
    </script>
</body>
</html>
